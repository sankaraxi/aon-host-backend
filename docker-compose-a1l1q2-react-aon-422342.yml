version: '3.8'

services:
  code-server:
    container_name: "code-server-a1l1q2-react-aon-422342"
    image: "sankarkg/level-two-test:latest"
    ports:
      - "8082:8080"
      - "5175:5173"
    volumes:
      - frontend-src-aon-422342:/home/coder/project/src
    environment:
      - WATCHPACK_POLLING=true
      # - WATCHPACK_POLLING=true
      # - PUID=1000
      # - PGID=1000
      # - TZ=Etc/UTC
      # - CONNECTION_TOKEN=
    command:
        code-server --bind-addr 0.0.0.0:8080 --auth none /home/coder/project
    networks:
      - my_network

  # nginx:
