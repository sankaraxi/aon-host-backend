version: '3.8'

services:
  code-server:
    container_name: "code-server-a1l1q1-react-aon-test-4190779"
    image: "sankarkg/level-one-test:latest"
    ports:
      - "21680:8080"
      - "21681:5173"
    volumes:
      - frontend-src-aon-test-4190779:/home/coder/project/src
    environment:
      - WATCHPACK_POLLING=true
    command:
        code-server --bind-addr 0.0.0.0:8080 --auth none /home/coder/project
    networks:
      - my_network

